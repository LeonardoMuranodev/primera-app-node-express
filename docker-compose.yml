services:
  app1:
    # Creo la app a partir del Dockerfile en la carpeta en a que estoy
    build: .
    volumes:
      - ./data:/app/data

  app2:
    build: .
    volumes:
      - ./data:/app/data

  load-balancer:
  #El balancer es con nginx, le digo que sea esa img
    image: nginx:latest
    ports:
      - "5000:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
