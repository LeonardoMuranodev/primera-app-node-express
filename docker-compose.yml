services:
  app1:
    # Creo la app a partir del Dockerfile en la carpeta en a que estoy
    build: .
    restart: always
    volumes:
      - ./data:/app/data
    depends_on:
      - db

  app2:
    build: .
    restart: always
    volumes:
      - ./data:/app/data
    depends_on:
      - db

  load-balancer:
  #El balancer es con nginx, le digo que sea esa img
    image: nginx:latest
    restart: always
    ports:
      - "5000:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: tienda
      MYSQL_ROOT_PASSWORD: root
